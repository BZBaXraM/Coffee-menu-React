server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Driver Game Center — a separate SPA (repo: GameCenterReact) built with Vite
    # base '/driver-game-center/' and bundled here under public/driver-game-center/.
    # Serve its own index.html for client-side routes (e.g. /driver-game-center/admin)
    # instead of falling through to the Menyu QR app below.
    location = /driver-game-center {
        return 301 /driver-game-center/;
    }
    location /driver-game-center/ {
        try_files $uri /driver-game-center/index.html;
    }

    # SPA fallback: let the React router handle client-side routes.
    # The app talks to the backend directly via VITE_API_BASE (see src/api.js),
    # so no API proxy is needed here.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
