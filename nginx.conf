server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Driver Game Center is its own Coolify-managed app (repo: GameCenterReact),
    # routed directly by Traefik via Host(menyuqr.com|www.menyuqr.com) &&
    # PathPrefix(/driver-game-center) — it never reaches this container.

    # SPA fallback: let the React router handle client-side routes.
    # The app talks to the backend directly via VITE_API_BASE (see src/api.js),
    # so no API proxy is needed here.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
